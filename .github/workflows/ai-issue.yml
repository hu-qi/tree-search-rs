name: AI Issue Handler

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Analyze Issue
        run: |
          resp=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"model":"glm-5","messages":[{"role":"user","content":"分析 Issue: ${{ github.event.issue.title }}. 内容: ${{ github.event.issue.body }}"}]}')
          
          echo "API Response: $resp"
          
          content=$(echo "$resp" | jq -r '.choices[0].message.content // "分析失败"')
          echo "$content" > analysis.txt

      - name: Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析\n\n${content}`
            });

      - name: Generate Code
        run: |
          resp=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"model":"glm-5","messages":[{"role":"user","content":"为 Issue: ${{ github.event.issue.title }} 生成 Rust 代码实现"}]}')
          
          echo "$resp" | jq -r '.choices[0].message.content // "生成失败"' > code.txt

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = `ai-${context.payload.issue.number}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branch}`,
                sha: context.sha
              });
              
              const analysis = fs.readFileSync('analysis.txt', 'utf8');
              const code = fs.readFileSync('code.txt', 'utf8');
              
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: `impl-${context.payload.issue.number}.md`,
                message: `Impl #${context.payload.issue.number}`,
                content: Buffer.from(`# Analysis\n${analysis}\n\n# Code\n\`\`\`rust\n${code}\n\`\`\``).toString('base64'),
                branch: branch
              });
              
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[AI] Fix #${context.payload.issue.number}`,
                head: branch,
                base: 'main',
                body: `${analysis}\n\nCloses #${context.payload.issue.number}`
              });
              
              console.log(`PR: ${pr.html_url}`);
            } catch (e) {
              console.log(e.message);
            }
