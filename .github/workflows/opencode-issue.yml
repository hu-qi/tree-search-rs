name: Auto Implement Issue

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure OpenCode
        run: |
          mkdir -p ~/.local/share/opencode
          cat > ~/.local/share/opencode/config.json << 'CONFIG'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "openai": {
                "options": {
                  "baseURL": "${{ secrets.OPENAI_API_BASE }}"
                }
              }
            }
          }
          CONFIG

      - name: Analyze and Implement Issue
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: ${{ secrets.MODEL || 'glm-5' }}
          prompt: |
            你是一个 Rust 项目维护者。分析这个 Issue：

            ## 步骤

            1. **评估需求**
               - 需求是否清晰？
               - 是否符合项目定位（tree-search CLI 工具）？
               - 实现复杂度如何？
               - 是否有安全风险？

            2. **决策**
               - 如果需求清晰且可行：实现它，创建分支，提交 PR
               - 如果需求不清晰或不可行：在 Issue 中说明原因，询问更多信息

            3. **实现规范**
               - 遵循 Rust 最佳实践
               - 添加必要的测试
               - 更新文档（如需要）
               - 保持代码简洁

            ## 输出

            - 如果实现：创建 PR，标题格式 `[Auto] Fix #<issue-number>: <brief-description>`
            - 如果不实现：在 Issue 中评论说明原因
