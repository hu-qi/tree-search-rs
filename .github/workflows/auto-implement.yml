name: Auto Implement Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Analyze Issue
        id: analyze
        run: |
          # Create request
          printf '{"model":"glm-5","messages":[{"role":"user","content":"分析这个 Issue: ${{ github.event.issue.title }}"}]}' > req.json
          
          # Call API
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @req.json)
          
          echo "Response: $response"
          
          content=$(echo "$response" | jq -r '.choices[0].message.content // "API调用失败"')
          echo "$content" > analysis.txt

      - name: Comment Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析结果\n\n${analysis}`
            });

      - name: Generate Implementation
        run: |
          printf '{"model":"glm-5","messages":[{"role":"user","content":"为 Issue: ${{ github.event.issue.title }} 生成实现方案"}]}' > req.json
          
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @req.json)
          
          content=$(echo "$response" | jq -r '.choices[0].message.content // "生成失败"')
          echo "$content" > implementation.txt

      - name: Create Branch and PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const implementation = fs.readFileSync('implementation.txt', 'utf8');
            const branch = `auto-fix-issue-${context.payload.issue.number}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branch}`,
                sha: context.sha
              });
              
              const content = Buffer.from(implementation).toString('base64');
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: `.auto-impl/issue-${context.payload.issue.number}.md`,
                message: `Auto-impl plan for #${context.payload.issue.number}`,
                content: content,
                branch: branch
              });
              
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] Fix #${context.payload.issue.number}: ${context.payload.issue.title}`,
                head: branch,
                base: 'main',
                body: `## 自动实现 #${context.payload.issue.number}\n\n${implementation}\n\nCloses #${context.payload.issue.number}`
              });
              
              console.log(`PR: ${pr.html_url}`);
            } catch (error) {
              console.log(`Error: ${error.message}`);
            }
