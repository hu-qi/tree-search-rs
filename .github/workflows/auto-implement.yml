name: Auto Implement Issue

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Analyze Issue
        id: analyze
        run: |
          # Call API
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"分析这个 Issue: ${{ github.event.issue.title }}\"}]}")
          
          echo "$response"
          
          # Save to file
          echo "$response" | jq -r '.choices[0].message.content' > analysis.txt || echo "解析失败" > analysis.txt

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析结果\n\n${analysis}`
            });