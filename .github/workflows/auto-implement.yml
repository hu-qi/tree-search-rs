name: Auto Implement Issue

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Analyze Issue
        id: analyze
        env:
          API_BASE: ${{ secrets.OPENAI_API_BASE }}
          API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Call API
          response=$(curl -s -X POST "$API_BASE/chat/completions" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"分析这个 Issue: $ISSUE_TITLE\"}]}")
          
          echo "Response: $response"
          
          content=$(echo "$response" | jq -r '.choices[0].message.content // "API调用失败"')
          echo "Content: $content"
          
          echo "$content" > analysis.txt

      - name: Comment Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析结果\n\n${analysis}`
            });

      - name: Generate Implementation
        id: generate
        env:
          API_BASE: ${{ secrets.OPENAI_API_BASE }}
          API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          response=$(curl -s -X POST "$API_BASE/chat/completions" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"为 Issue: $ISSUE_TITLE 生成实现方案。内容: $ISSUE_BODY\"}]}")
          
          content=$(echo "$response" | jq -r '.choices[0].message.content // "生成失败"')
          echo "$content" > implementation.txt

      - name: Create Branch and PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const implementation = fs.readFileSync('implementation.txt', 'utf8');
            const branch = `auto-fix-issue-${context.payload.issue.number}`;
            
            try {
              // Create branch
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branch}`,
                sha: context.sha
              });
              
              // Create file
              const content = Buffer.from(implementation).toString('base64');
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: `.auto-impl/issue-${context.payload.issue.number}.md`,
                message: `Auto-impl plan for #${context.payload.issue.number}`,
                content: content,
                branch: branch
              });
              
              // Create PR
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] Fix #${context.payload.issue.number}: ${context.payload.issue.title}`,
                head: branch,
                base: 'main',
                body: `## 自动实现 #${context.payload.issue.number}\n\n${implementation}\n\nCloses #${context.payload.issue.number}`
              });
              
              console.log(`PR: ${pr.html_url}`);
            } catch (error) {
              console.log(`Error: ${error.message}`);
            }
