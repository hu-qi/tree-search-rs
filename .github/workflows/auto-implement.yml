name: Auto Implement Issue

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze Issue
        id: analyze
        run: |
          # Analyze issue
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"分析这个 Issue，判断是否可以自动实现。标题: ${{ github.event.issue.title }}。内容: ${{ github.event.issue.body }}。回答：可行/不可行，并说明原因。\"}]}")
          
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          echo "$content" > analysis.txt
          echo "analysis=$content" >> $GITHUB_OUTPUT

      - name: Comment Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析结果\n\n${analysis}`
            });

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Implementation Plan
        id: generate
        run: |
          # Generate implementation plan
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"为这个 Issue 生成实现方案。标题: ${{ github.event.issue.title }}。内容: ${{ github.event.issue.body }}。给出具体的修改建议。\"}]}")
          
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          echo "$content" > implementation.txt

      - name: Create Branch and PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const implementation = fs.readFileSync('implementation.txt', 'utf8');
            const branch = `auto-fix-issue-${context.payload.issue.number}`;
            
            // Create branch
            const { data: ref } = await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: context.sha
            });
            
            // Create file with implementation plan
            const content = Buffer.from(implementation).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: `.auto-impl/issue-${context.payload.issue.number}.md`,
              message: `Auto-implementation plan for issue #${context.payload.issue.number}`,
              content: content,
              branch: branch
            });
            
            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Fix #${context.payload.issue.number}: ${context.payload.issue.title}`,
              head: branch,
              base: 'main',
              body: `## 自动实现 Issue #${context.payload.issue.number}\n\n### 原始需求\n${context.payload.issue.body}\n\n### 实现方案\n${implementation}\n\n---\n\n⚠️ 这是自动生成的 PR，请审查后再合并。\n\nCloses #${context.payload.issue.number}`
            });
            
            console.log(`PR created: ${pr.html_url}`);
