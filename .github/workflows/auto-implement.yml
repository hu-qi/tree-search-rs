name: Auto Implement Issue

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze Issue
        id: analyze
        run: |
          # Analyze issue
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"分析这个 GitHub Issue，判断是否可以自动实现。如果可以，说明实现方案；如果不行，说明原因。\\n\\n标题: ${{ github.event.issue.title }}\\n\\n内容: ${{ github.event.issue.body }}\\n\\n请用以下格式回答：\\n可行: 是/否\\n原因: ...\\n方案: ...\"}], \"temperature\": 0.7}")
          
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          echo "$content" > analysis.txt
          
          # Check if implementable
          if echo "$content" | grep -q "可行: 是"; then
            echo "implementable=true" >> $GITHUB_OUTPUT
          else
            echo "implementable=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## 🤖 分析结果\n\n${analysis}\n\n---\n\n${{ steps.analyze.outputs.implementable == 'true' ? '✅ 尝试自动实现中...' : '❌ 无法自动实现' }}`
            });

      - name: Generate Implementation
        if: steps.analyze.outputs.implementable == 'true'
        id: generate
        run: |
          # Get current code structure
          structure=$(find . -name "*.rs" -type f | head -20)
          
          # Generate implementation
          response=$(curl -s -X POST "${{ secrets.OPENAI_API_BASE }}/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"glm-5\", \"messages\": [{\"role\": \"user\", \"content\": \"基于以下 Rust 项目结构和 Issue 需求，生成具体的代码修改方案。\\n\\n项目结构:\\n$structure\\n\\nIssue 标题: ${{ github.event.issue.title }}\\nIssue 内容: ${{ github.event.issue.body }}\\n\\n请给出：\\n1. 需要修改的文件\\n2. 具体的修改内容（用 diff 格式）\\n3. 简要说明\"}], \"temperature\": 0.3}")
          
          content=$(echo "$response" | jq -r '.choices[0].message.content')
          echo "$content" > implementation.txt
          
          echo "implementation<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Branch and Commit
        if: steps.analyze.outputs.implementable == 'true'
        run: |
          # Create branch
          branch="auto-fix-issue-${{ github.event.issue.number }}"
          git checkout -b "$branch"
          
          # Try to apply changes (simple cases only)
          # For complex changes, manual review is needed
          implementation=$(cat implementation.txt)
          
          # Commit with message
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add implementation plan as a file for review
          mkdir -p .auto-impl
          echo "$implementation" > .auto-impl/plan.md
          git add .auto-impl/plan.md
          git commit -m "Auto-implementation plan for issue #${{ github.event.issue.number }}" || echo "No changes"
          
          # Push branch
          git push origin "$branch" || echo "Push failed"

      - name: Create Pull Request
        if: steps.analyze.outputs.implementable == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const implementation = fs.readFileSync('implementation.txt', 'utf8');
            const branch = `auto-fix-issue-${context.payload.issue.number}`;
            
            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] Fix #${context.payload.issue.number}: ${context.payload.issue.title}`,
                head: branch,
                base: 'main',
                body: `## 自动实现 Issue #${context.payload.issue.number}\n\n### 原始需求\n${context.payload.issue.body}\n\n### 实现方案\n${implementation}\n\n---\n\n⚠️ **注意：这是自动生成的 PR，请仔细审查后再合并。**\n\nCloses #${context.payload.issue.number}`
              });
              
              console.log(`PR created: ${pr.data.html_url}`);
            } catch (error) {
              console.log(`PR creation failed: ${error.message}`);
              // Comment on issue if PR creation fails
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `❌ 自动创建 PR 失败：${error.message}\n\n请手动实现。`
              });
            }
